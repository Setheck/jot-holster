name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# The set of files that go into the published extension. Tests, CI configs,
# and tooling are deliberately excluded — keep this list in sync with new
# runtime files.
env:
  EXTENSION_FILES: >-
    manifest.json
    background.js
    popup.html
    popup.css
    popup.js
    vault.js
    jwt.js
    validation.js
    x509.js
    icons

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: unit tests
        run: npm test

      - name: cache playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: install playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: install playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: ui tests
        run: npm run test:ui

      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  build:
    name: build extension
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: extract manifest version
        id: version
        run: |
          v=$(jq -r .version manifest.json)
          if [ -z "$v" ] || [ "$v" = "null" ]; then
            echo "manifest.json has no version" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "manifest version: $v"

      - name: web-ext lint (Firefox compatibility)
        # Catches MV3 / Firefox-specific manifest issues. Continues on warnings;
        # only hard errors fail the job.
        run: |
          npx --yes web-ext@latest lint \
            --source-dir . \
            --ignore-files \
              'tests/**' \
              '.github/**' \
              'package*.json' \
              'playwright.config.js' \
              'README.md' \
              '.gitignore' \
              'node_modules/**' \
              'test-results/**' \
              'playwright-report/**' \
              '*.tgz' \
            --warnings-as-errors=false

      - name: build chrome zip and firefox xpi
        run: |
          mkdir -p dist
          version="${{ steps.version.outputs.version }}"
          read -ra files <<< "$EXTENSION_FILES"
          # Sanity: every listed file/dir must exist
          for f in "${files[@]}"; do
            if [ ! -e "$f" ]; then
              echo "missing extension file: $f" >&2
              exit 1
            fi
          done
          zip -qr "dist/jot-holster-chrome-${version}.zip"  "${files[@]}"
          zip -qr "dist/jot-holster-firefox-${version}.xpi" "${files[@]}"
          ls -la dist/

      - name: upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jot-holster-${{ steps.version.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  release:
    name: github release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: jot-holster-${{ needs.build.outputs.version }}
          path: dist/

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
